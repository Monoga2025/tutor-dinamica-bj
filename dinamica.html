<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tutor Dinámica — B&J</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="window.katexReady=true"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d1117;--panel:#161b22;--border:#30363d;
  --blue:#58a6ff;--green:#2ea043;--accent:#e94560;
  --yellow:#d29922;--text:#e6edf3;--muted:#8b949e;
  --purple:#8b5cf6;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;}
body{display:flex;flex-direction:column;}

/* ─── TOP BAR ─── */
#topbar{
  display:flex;align-items:center;gap:8px;padding:5px 12px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;user-select:none;
}
#logo{font-weight:800;font-size:14px;color:var(--blue);letter-spacing:.5px;}
#rating-badge{
  display:flex;align-items:center;gap:5px;
  background:#1a2332;border:1px solid var(--blue);border-radius:20px;
  padding:2px 10px;font-size:12px;font-weight:700;color:var(--blue);cursor:default;
}
#rating-badge .r-icon{font-size:13px;}
#rating-val{font-size:14px;}
#streak-badge{
  background:#1a2e1a;border:1px solid var(--green);border-radius:20px;
  padding:2px 9px;font-size:11px;font-weight:700;color:var(--green);
}
.vsep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.tbtn{padding:4px 9px;border:1px solid var(--border);border-radius:5px;background:#21262d;color:var(--text);cursor:pointer;font-size:12px;transition:background .15s;white-space:nowrap;}
.tbtn:hover{background:#30363d;}
.tbtn.active{background:var(--accent);border-color:var(--accent);}
#next-ex-btn{
  background:var(--green);border:none;color:#fff;border-radius:6px;
  padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;
  transition:opacity .15s;white-space:nowrap;
}
#next-ex-btn:hover{opacity:.85;}
#current-ex-label{font-size:11px;color:var(--yellow);font-weight:700;padding:0 2px;}
#api-wrap{margin-left:auto;display:flex;align-items:center;gap:5px;}
#api-lbl{font-size:11px;color:var(--muted);}
.sw{position:relative;width:32px;height:17px;}
.sw input{opacity:0;width:0;height:0;}
.sw-t{position:absolute;inset:0;background:#30363d;border-radius:17px;cursor:pointer;transition:.2s;}
.sw-t::before{content:"";position:absolute;width:12px;height:12px;left:2.5px;top:2.5px;background:#fff;border-radius:50%;transition:.2s;}
.sw input:checked+.sw-t{background:var(--blue);}
.sw input:checked+.sw-t::before{transform:translateX(15px);}
#gear-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);padding:3px 7px;cursor:pointer;font-size:14px;}
#gear-btn:hover{color:var(--text);}

/* ─── TOOLBAR ─── */
#toolbar{
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  background:#0a0f14;border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;
}
.cdot{width:22px;height:22px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s;flex-shrink:0;}
.cdot.active{border-color:#fff;transform:scale(1.2);}
#sz{width:60px;accent-color:var(--blue);cursor:pointer;}
#autostatus{font-size:11px;padding:3px 7px;border-radius:10px;background:#21262d;border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap;}
#autostatus.on{border-color:var(--green);color:var(--green);}
#autostatus.analyzing{border-color:var(--yellow);color:var(--yellow);}
.mbtn{background:var(--blue);border:none;color:#fff;border-radius:6px;padding:4px 11px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;transition:opacity .15s;}
.mbtn:hover{opacity:.85;}
.mbtn.red{background:var(--accent);}
.mbtn.dark{background:#21262d;border:1px solid var(--border);color:var(--text);}
.mbtn.dark.active{background:#c94560;border-color:#e94560;color:#fff;}
#ai-layer-btn{font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:#21262d;color:var(--muted);cursor:pointer;}
#ai-layer-btn.show-ann{border-color:var(--purple);color:var(--purple);background:#1a1040;}
#pos-indicator{font-size:10px;color:var(--muted);margin-left:auto;font-variant-numeric:tabular-nums;}

/* ─── MAIN LAYOUT ─── */
#main{display:flex;flex:1;overflow:hidden;}

/* ─── SIDEBAR ─── */
#sidebar{
  width:230px;min-width:230px;background:var(--panel);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:min-width .25s,width .25s;flex-shrink:0;overflow:hidden;
}
#sidebar.collapsed{width:0;min-width:0;}
#sb-hd{
  padding:8px 10px 6px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
#sb-hd h3{font-size:12px;font-weight:700;color:var(--blue);}
#sb-toggle{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;}

/* ELO next */
#sb-next{
  margin:6px 8px 4px;background:var(--green);border:none;color:#fff;border-radius:7px;
  padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer;width:calc(100% - 16px);
  transition:opacity .15s;flex-shrink:0;
}
#sb-next:hover{opacity:.85;}
/* Indicador guardado */
#save-ind{
  font-size:10px;color:var(--green);padding:1px 6px;border-radius:8px;
  border:1px solid var(--green);opacity:0;transition:opacity .3s;
  background:#0a150a;white-space:nowrap;
}

/* Capitulos tabs */
#ch-tabs{
  display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;
}
.ch-tab{
  flex:1;padding:5px 4px;text-align:center;font-size:11px;font-weight:700;
  cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;
}
.ch-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.ch-tab:hover{color:var(--text);}

/* Lista de ejercicios */
#ex-list{flex:1;overflow-y:auto;padding:6px;}
#ex-list::-webkit-scrollbar{width:3px;}
#ex-list::-webkit-scrollbar-thumb{background:var(--border);}

.ex-btn{
  width:100%;text-align:left;padding:6px 8px;border-radius:6px;
  background:none;border:1px solid var(--border);color:var(--text);
  cursor:pointer;margin-bottom:4px;transition:all .15s;
  display:flex;align-items:center;gap:7px;
}
.ex-btn:hover{background:#21262d;border-color:var(--muted);}
.ex-btn.active-ex{border-color:var(--yellow);background:#1a1600;}
.ex-btn.mastered{border-color:var(--green);background:#0a150a;}
.ex-btn.attempted{border-color:var(--yellow);}
.ex-btn.failed{border-color:var(--accent);}

.ex-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--border);
}
.ex-btn.mastered .ex-dot{background:var(--green);}
.ex-btn.attempted .ex-dot{background:var(--yellow);}
.ex-btn.failed .ex-dot{background:var(--accent);}
.ex-btn.active-ex .ex-dot{background:var(--yellow);}

.ex-info{flex:1;min-width:0;}
.ex-num{font-size:11px;font-weight:700;color:var(--blue);}
.ex-title{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-tag{
  font-size:9px;padding:1px 5px;border-radius:8px;background:#21262d;
  color:var(--muted);border:1px solid var(--border);white-space:nowrap;flex-shrink:0;
}
.ex-tag.te{border-color:#2ea043;color:#2ea043;}
.ex-tag.fm{border-color:#58a6ff;color:#58a6ff;}
.ex-tag.im{border-color:#8b5cf6;color:#8b5cf6;}
.ex-tag.po{border-color:#d29922;color:#d29922;}

/* Enunciado en sidebar */
#sb-enunciado{
  border-top:1px solid var(--border);padding:6px 8px;flex-shrink:0;
  max-height:110px;overflow-y:auto;display:none;
}
#sb-enunciado.show{display:block;}
#sb-enunciado h4{font-size:11px;color:var(--yellow);font-weight:700;margin-bottom:4px;}
#sb-enunciado p{font-size:11px;line-height:1.55;color:var(--text);}
#sb-enunciado .sb-meta{font-size:10px;color:var(--muted);margin-top:5px;}

/* Result buttons en sidebar */
#sb-result{
  border-top:1px solid var(--border);padding:7px 10px;
  display:none;gap:6px;flex-shrink:0;
}
#sb-result.show{display:flex;}
#sb-result button{
  flex:1;padding:6px 4px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;
}
#btn-correct{background:#0a150a;border-color:var(--green);color:var(--green);}
#btn-incorrect{background:#150a0a;border-color:var(--accent);color:var(--accent);}
#btn-correct:hover{background:var(--green);color:#fff;}
#btn-incorrect:hover{background:var(--accent);color:#fff;}

/* Botón abrir sidebar */
#open-sidebar{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  z-index:50;background:var(--blue);border:none;color:#fff;
  padding:12px 4px;cursor:pointer;border-radius:0 8px 8px 0;
  font-size:11px;writing-mode:vertical-lr;display:none;
}

/* ─── CANVAS ─── */
#cw{flex:1;position:relative;overflow:hidden;background:#f4f4f0;touch-action:none;background-image:radial-gradient(#d5d5d5 1.5px, transparent 1.5px);background-size:30px 30px;}
#canvas{position:absolute;top:0;left:0;touch-action:none;cursor:crosshair;z-index:1;}
#canvas.pan-cur{cursor:grab;}#canvas.pan-cur:active{cursor:grabbing;}
#canvas.erase-cur{cursor:cell;}
#ann-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:2;}
#analyze-ind{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.8);color:var(--yellow);padding:5px 14px;
  border-radius:20px;font-size:12px;font-weight:700;
  display:none;z-index:10;pointer-events:none;
}

/* ─── FLOATING EXERCISE BOX ─── */
#ex-float{
  position:absolute;top:12px;left:12px;z-index:20;
  max-width:min(500px,calc(100% - 360px));
  background:rgba(13,17,23,.95);border:1px solid var(--yellow);
  border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.4);
  padding:10px 13px;display:none;
}
#ex-float.show{display:block;}
#ex-float-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
#ex-float-hdr h4{font-size:12px;color:var(--yellow);font-weight:700;}
#ex-float-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 2px;}
#ex-float-body{font-size:12px;line-height:1.55;color:var(--text);}
#ex-float-diff{font-size:10px;color:var(--muted);margin-top:5px;}

/* ─── ELO RESULT MODAL ─── */
#elo-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;align-items:center;justify-content:center;}
#elo-modal.open{display:flex;}
#elo-box{
  background:var(--panel);border:1px solid var(--green);border-radius:14px;
  padding:24px 28px;width:340px;max-width:90%;text-align:center;
}
#elo-box h2{font-size:1.1rem;color:var(--green);margin-bottom:10px;}
#elo-detail{font-size:0.88rem;color:var(--muted);line-height:1.7;margin-bottom:14px;}
#elo-next-btn{background:var(--green);border:none;color:#fff;border-radius:7px;padding:8px 22px;cursor:pointer;font-size:0.9rem;font-weight:700;}
#elo-next-btn:hover{opacity:.85;}
#elo-close-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:8px 16px;cursor:pointer;font-size:0.9rem;margin-left:8px;}

/* ─── AI BOARD (overlay sobre pizarra) ─── */
#ai-board{
  position:absolute;right:10px;top:10px;
  width:min(360px,calc(50% - 10px));
  background:rgba(13,17,23,0.9);backdrop-filter:blur(6px);
  border:1px solid var(--blue);border-radius:12px;
  z-index:100;display:flex;flex-direction:column;
  max-height:calc(100% - 20px);
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  transition:transform .3s,opacity .3s;
}
#ai-board.minimized{transform:translateX(calc(100% + 10px));opacity:0;pointer-events:none;}
#ai-board-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;cursor:default;
}
#ai-board-hd h3{font-size:12px;font-weight:700;color:var(--blue);}
#ai-board-body{
  padding:10px;overflow-y:auto;flex:1;
  font-size:13px;line-height:1.65;color:var(--text);
}
#ai-board-body::-webkit-scrollbar{width:3px;}
#ai-board-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.aib-msg{padding:8px 10px;border-radius:8px;word-wrap:break-word;}
.aib-msg.ai{background:#21262d;border:1px solid var(--border);}
.aib-msg.ai.ok{border-color:var(--green);background:#0a1a0d;}
.aib-msg.ai.err{border-color:var(--accent);background:#1a0a0d;}
.aib-msg.ai.hint{border-color:var(--yellow);background:#1a160a;}
.aib-msg.sys{color:var(--blue);font-size:11px;text-align:center;padding:4px 8px;}
.aib-msg.typing{font-style:italic;color:var(--muted);font-size:12px;}
.aib-msg .katex{color:inherit;font-size:1em;}
.aib-msg .katex-display{overflow-x:auto;margin:4px 0;}
/* error bar */
#err-bar{padding:4px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;background:#150d0d;}
#err-bar-txt{font-size:10px;color:var(--accent);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#err-count-lbl{font-size:10px;color:var(--muted);}
/* result actions dentro del board */
.result-actions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.ra-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:#21262d;color:var(--text);cursor:pointer;font-size:11px;font-weight:700;}
.ra-btn.green{border-color:var(--green);color:var(--green);background:#0a1a0d;}
.ra-btn.red{border-color:var(--accent);color:var(--accent);background:#1a0a0d;}

/* ─── INPUT BAR (parte inferior) ─── */
#inputbar{
  display:flex;align-items:flex-end;gap:5px;padding:5px 8px;
  background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;
}
#main-input{
  flex:1;background:#21262d;border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:7px 9px;font-size:13px;resize:none;height:38px;
  max-height:90px;font-family:inherit;
}
#main-input:focus{outline:none;border-color:var(--blue);}
#main-input::placeholder{color:var(--muted);}
.cbtn{background:var(--blue);border:none;color:#fff;border-radius:7px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:700;transition:opacity .15s;display:flex;align-items:center;justify-content:center;}
.cbtn:disabled{opacity:.4;cursor:default;}
.cbtn.cam{background:var(--green);}
.cbtn.mic{background:#6a1b9a;}
.cbtn.mic.rec{background:var(--accent);animation:mic-pulse 1.4s infinite;}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(234,69,96,.5);}60%{box-shadow:0 0 0 7px rgba(234,69,96,0);}}
#hint-chips{
  padding:3px 8px;background:var(--panel);border-top:1px solid var(--border);
  display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;
}
/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
/* hint chips */
.hchip{font-size:10px;padding:2px 8px;border-radius:10px;background:#21262d;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.hchip:hover{border-color:var(--yellow);color:var(--yellow);}

/* ─── SETTINGS MODAL ─── */
#smodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:center;justify-content:center;}
#smodal.open{display:flex;}
#sbox{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:440px;}
#sbox h2{margin-bottom:12px;font-size:14px;}
.srow{margin-bottom:10px;}
.srow label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;}
.srow input,.srow select{width:100%;background:#21262d;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:6px 8px;font-size:12px;}
.srow input:focus,.srow select:focus{outline:none;border-color:var(--blue);}
#ssave{background:var(--blue);border:none;color:#fff;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:13px;font-weight:700;}
</style>
</head>
<body>

<!-- SETTINGS MODAL -->
<div id="smodal">
  <div id="sbox">
    <h2>⚙️ Configuración</h2>
    <div class="srow"><label>OpenRouter API Key</label><input type="password" id="s-or-key" placeholder="sk-or-v1-..."></div>
    <div class="srow"><label>Modelo</label>
      <select id="s-or-model">
        <option value="google/gemini-2.5-flash">Gemini 2.5 Flash ⚡ (barato)</option>
        <option value="google/gemini-2.5-pro">Gemini 2.5 Pro</option>
        <option value="anthropic/claude-sonnet-4-5">Claude Sonnet</option>
      </select>
    </div>
    <div class="srow"><label>Delay auto-análisis (segundos)</label><input type="number" id="s-delay" min="2" max="15" value="5"></div>
    <div class="srow">
      <label>Voz TTS</label>
      <select id="s-voice-sel"></select>
      <button onclick="previewVoice()" style="margin-top:4px;background:#21262d;border:1px solid var(--border);color:var(--text);border-radius:5px;padding:3px 10px;cursor:pointer;font-size:11px;">▶ Probar voz</button>
      <div id="kokoro-status" style="margin-top:4px;font-size:11px;color:var(--muted);display:none;"></div>
    </div>
    <div class="srow"><label>Silencio antes de enviar voz (segundos)</label><input type="number" id="s-mic-delay" min="1" max="8" value="3.5" step="0.5"></div>
    <button id="ssave">✓ Guardar</button>
    <button onclick="document.getElementById('smodal').classList.remove('open')" style="background:none;border:none;color:var(--muted);cursor:pointer;margin-left:10px;font-size:12px;">Cancelar</button>
  </div>
</div>

<!-- ELO RESULT MODAL -->
<div id="elo-modal">
  <div id="elo-box">
    <h2 id="elo-result-icon">✅ ¡Correcto!</h2>
    <div id="elo-detail"></div>
    <button id="elo-next-btn" onclick="nextExercise(); document.getElementById('elo-modal').classList.remove('open')">▶ Siguiente ejercicio</button>
    <button id="elo-close-btn" onclick="document.getElementById('elo-modal').classList.remove('open')">Seguir aquí</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">📐 Tutor Dinámica</div>
  <div class="vsep"></div>
  <div id="rating-badge" title="Rating ELO — sube al resolver correctamente"><span class="r-icon">⚡</span><span id="rating-val">1200</span></div>
  <div id="streak-badge" title="Racha de ejercicios correctos">🔥 <span id="streak-val">0</span></div>
  <span id="current-ex-label">—</span>
  <span id="save-ind">💾 Guardado</span>
  <div id="api-wrap">
    <button id="gear-btn" onclick="openSettings()">⚙</button>
  </div>
</div>

<!-- TOOLBAR PIZARRA -->
<div id="toolbar">
  <div class="cdot active" style="background:#111" data-col="#111" onclick="setColor(this)" title="Negro"></div>
  <div class="cdot" style="background:#e94560" data-col="#e94560" onclick="setColor(this)" title="Rojo · fuerzas"></div>
  <div class="cdot" style="background:#2ea043" data-col="#2ea043" onclick="setColor(this)" title="Verde · normal/apoyo"></div>
  <div class="cdot" style="background:#58a6ff" data-col="#58a6ff" onclick="setColor(this)" title="Azul · vectores"></div>
  <div class="cdot" style="background:#d29922" data-col="#d29922" onclick="setColor(this)" title="Amarillo · aceleraciones"></div>
  <div class="cdot" style="background:#8b5cf6" data-col="#8b5cf6" onclick="setColor(this)" title="Morado · ejes coord"></div>
  <div class="vsep"></div>
  <input type="range" id="sz" min="1" max="20" value="3" oninput="brushSz=+this.value" title="Grosor del trazo">
  <button class="mbtn dark" id="btn-erase" onclick="toggleErase()" title="Modo borrador">◻ Borrar</button>
  <button class="mbtn dark" onclick="undoStroke()" title="Deshacer último trazo">↶</button>
  <button class="mbtn dark" onclick="redoStroke()" title="Rehacer último trazo">↷</button>
  <button class="mbtn dark" onclick="clearCanvas()" title="Limpiar toda la pizarra">🗑 Limpiar</button>

// ELO SYSTEM
// ═══════════════════════════════════════════════════════════
let ELO = {
  rating: 1200,
  streak: 0,
  totalAttempts: 0,
  totalWins: 0,
  hintsUsed: 0,
  currentExId: null,
  attempted: {}, // exId → {hints, success, ts}
};
try { Object.assign(ELO, JSON.parse(localStorage.getItem('din_elo')||'{}')); } catch(e){}

function saveELO() { localStorage.setItem('din_elo', JSON.stringify(ELO)); }

function eloExpected(ratingPlayer, ratingExercise) {
  return 1 / (1 + Math.pow(10, (ratingExercise - ratingPlayer) / 400));
}

function eloScore(hintsUsed, success) {
  if (!success) return 0;
  if (hintsUsed === 0) return 1.0;
  if (hintsUsed === 1) return 0.7;
  if (hintsUsed === 2) return 0.4;
  return 0.2;
}

function updateRating(exId, success) {
  const ex = EXERCISES[exId];
  if (!ex) return;
  const E = eloExpected(ELO.rating, ex.difficulty);
  const S = eloScore(ELO.hintsUsed, success);
  const delta = Math.round(32 * (S - E));
  const before = ELO.rating;
  ELO.rating = Math.max(800, ELO.rating + delta);
  ELO.totalAttempts++;
  if (success) { ELO.totalWins++; ELO.streak++; } else { ELO.streak = 0; }
  ELO.attempted[exId] = { hints: ELO.hintsUsed, success, ts: Date.now() };
  ELO.hintsUsed = 0;
  saveELO();
  updateRatingUI();
  return { before, after: ELO.rating, delta, S, E };
}

function nextExercise() {
  // Pick exercise closest to rating+50 (ZPD), not already mastered
  const target = ELO.rating + 50;
  let best = null, bestDiff = Infinity;
  Object.entries(EXERCISES).forEach(([k, ex]) => {
    const att = ELO.attempted[k];
    if (att && att.success) return; // already mastered
    const diff = Math.abs(ex.difficulty - target);
    if (diff < bestDiff) { bestDiff = diff; best = k; }
  });
  if (!best) {
    // All done — reset attempts
    ELO.attempted = {};
    saveELO();
    best = Object.keys(EXERCISES)[0];
  }
  loadExercise(best);
}

// ── Capítulo activo en sidebar ─────────────────────────────
let activeCh = 12;

function switchChapter(ch) {
  activeCh = ch;
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.toggle('active', +t.dataset.ch === ch));
  renderExList();
}

function tagLabel(method) {
  const map = {'trabajo-energia':'T-E','f-ma':'F=ma','impulso-momento':'I-M','potencia':'P'};
  return map[method] || method.substring(0,3);
}
function tagClass(method) {
  const map = {'trabajo-energia':'te','f-ma':'fm','impulso-momento':'im','potencia':'po'};
  return map[method] || '';
}

function renderExList() {
  const list = document.getElementById('ex-list');
  list.innerHTML = '';
  const exs = Object.entries(EXERCISES).filter(([,e]) => e.chapter === activeCh);
  if (!exs.length) { list.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--muted);">Sin ejercicios en este capítulo.</div>'; return; }
  exs.forEach(([key, ex]) => {
    const att = ELO.attempted[key];
    const isCurrent = key === ELO.currentExId;
    const btn = document.createElement('button');
    btn.className = 'ex-btn' +
      (isCurrent ? ' active-ex' : '') +
      (att && att.success ? ' mastered' : '') +
      (att && !att.success ? ' attempted' : '');
    btn.title = ex.title;
    const hasSol = DB_SOLUTIONS.has(ex.id);
    btn.innerHTML = `
      <div class="ex-dot"></div>
      <div class="ex-info">
        <div class="ex-num">${ex.id}${hasSol ? ' <span style="color:var(--yellow);font-size:9px;">📄</span>' : ''}</div>
        <div class="ex-title">${ex.title}</div>
      </div>
      <span class="ex-tag ${tagClass(ex.method)}">${tagLabel(ex.method)}</span>
    `;
    btn.onclick = () => loadExercise(key);
    list.appendChild(btn);
  });
}

function loadExercise(exId) {
  ELO.currentExId = exId;
  ELO.hintsUsed = 0;
  saveELO();
  const ex = EXERCISES[exId];

  // Update topbar label
  document.getElementById('current-ex-label').textContent = ex.id;

  // Update sidebar enunciado
  document.getElementById('sb-ex-title').textContent = ex.id + ' — ' + ex.title;
  document.getElementById('sb-ex-body').textContent = ex.text;
  document.getElementById('sb-ex-meta').textContent = `Método: ${ex.method} · ELO: ${ex.difficulty}`;
  document.getElementById('sb-enunciado').classList.add('show');
  document.getElementById('sb-result').classList.add('show');

  // Limpiar canvas inmediatamente al cambiar ejercicio
  strokes = []; redoStack = []; annotations = [];
  render(); renderAnnotations();

  if (serverOnline) {
    fetch(SERVER+'/api/strokes?board='+encodeURIComponent(exId))
      .then(r=>r.json()).then(data=>{
        strokes = data.strokes || [];
        redoStack = [];
        render();
      });
    fetch(SERVER+'/api/chat?ex_id='+encodeURIComponent(exId))
      .then(r=>r.json()).then(msgs=>{
        document.getElementById('ai-board-body').innerHTML = '';
        chatHistory = [];
        // Reconstruct chatHistory from all saved messages
        for (const m of msgs) {
          chatHistory.push({role: m.role==='user'?'user':'assistant', content: m.content});
        }
        // Show only the last AI message on the board
        const lastAI = [...msgs].reverse().find(m => m.role === 'ai');
        if (lastAI) {
          addMsg('ai', lastAI.content, lastAI.cls, false);
        }
        if (msgs.length === 0) {
          addMsg('sys', `📖 ${ex.id} — ${ex.title}\n${ex.text}`, '', false);
          sendAI(`Empecemos el ejercicio ${ex.id}. Por favor, DIBUJA el Diagrama de Cuerpo Libre (DCL) inicial en la pizarra usando "annotations" y explícamelo brevemente.`, false, false);
        } else {
          if (ELO.attempted[exId] && ELO.attempted[exId].success) {
             addMsg('sys', '✅ Ejercicio previamente solucionado. Puedes seguir revisando tus apuntes.', '', false);
          }
        }
      });
  } else {
    addMsg('sys', `📖 ${ex.id} — ${ex.title}\n${ex.text}`);
    sendAI(`Empecemos el ejercicio ${ex.id}. Por favor, DIBUJA el Diagrama de Cuerpo Libre (DCL) inicial en la pizarra usando "annotations" y explícamelo brevemente.`, false, false);
  }
}

function markResult(success) {
  if (!ELO.currentExId) { addMsg('sys', 'Selecciona un ejercicio primero.'); return; }
  const hintsSnapshot = ELO.hintsUsed;  // capture BEFORE updateRating resets it
  const result = updateRating(ELO.currentExId, success);
  syncELOtoServer(ELO.currentExId, success, result.before, result.after, hintsSnapshot);
  const ex = EXERCISES[ELO.currentExId];
  const delta = result.delta >= 0 ? '+'+result.delta : result.delta;
  document.getElementById('elo-result-icon').textContent = success ? '✅ ¡Correcto!' : '❌ Incorrecto';
  document.getElementById('elo-detail').innerHTML =
    `<strong>${ex.id}</strong><br>
     Rating: ${result.before} → <strong>${result.after}</strong> (${delta} pts)<br>
     Pistas usadas: ${result.S === 1 ? 'ninguna 🎯' : result.S === 0.7 ? '1 pista' : result.S === 0.4 ? '2 pistas' : '3+ pistas'}<br>
     Racha: 🔥 ${ELO.streak}<br><br>
     <em style="color:var(--muted);font-size:11px;">Respuesta: ${ex.answer}</em>`;
  document.getElementById('elo-modal').classList.add('open');
  renderExList();
}

function updateRatingUI() {
  document.getElementById('rating-val').textContent = ELO.rating;
  document.getElementById('streak-val').textContent = ELO.streak;
}

let dynErrors = [];
try { dynErrors = JSON.parse(localStorage.getItem('din_errors')||'[]'); } catch(e){}

function addError(desc) {
  desc = desc.trim().substring(0, 80);
  const found = dynErrors.find(e => e.d.toLowerCase() === desc.toLowerCase());
  if (found) found.n++;
  else dynErrors.push({ d: desc, n: 1 });
  dynErrors.sort((a,b) => b.n - a.n);
  if (dynErrors.length > 10) dynErrors = dynErrors.slice(0, 10);
  localStorage.setItem('din_errors', JSON.stringify(dynErrors));
  renderErrors();
}

function renderErrors() {
  const bar = document.getElementById('err-bar-txt');
  const cnt = document.getElementById('err-count-lbl');
  cnt.textContent = dynErrors.length + ' errores';
  if (!dynErrors.length) { bar.textContent = 'Sin errores registrados'; return; }
  bar.textContent = '⚠️ ' + dynErrors.map(e => e.d + (e.n>1?` ×${e.n}`:'')).join(' · ');
  bar.title = dynErrors.map((e,i) => `${i+1}. ${e.d} (×${e.n})`).join('\n');
}

let showAnnotations = true;

function resize() {
  const r = cwEl.getBoundingClientRect();
  canvas.width = r.width;  canvas.height = r.height;
  annCv.width  = r.width;  annCv.height  = r.height;
  render(); renderAnnotations();
}
resize();
new ResizeObserver(resize).observe(cwEl);

const screenToWorld = (sx,sy) => ({ x: sx/viewScale+viewOffset.x, y: sy/viewScale+viewOffset.y });
const wx2sx = wx => (wx-viewOffset.x)*viewScale;
const wy2sy = wy => (wy-viewOffset.y)*viewScale;

function getScreenPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(canvas.width/r.width), y:(e.clientY-r.top)*(canvas.height/r.height) };
}

function setColor(el) {
  color = el.dataset.col;
  document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
  if (tool === 'eraser') { tool='pen'; document.getElementById('btn-erase').classList.remove('active'); }
}

function toggleErase() {
  tool = tool==='eraser' ? 'pen' : 'eraser';
  document.getElementById('btn-erase').classList.toggle('active', tool==='eraser');
  canvas.classList.toggle('erase-cur', tool==='eraser');
}

function togglePan() {
  panModeBtn = !panModeBtn;
  document.getElementById('btn-pan').classList.toggle('active', panModeBtn);
  canvas.classList.toggle('pan-cur', panModeBtn);
}

let _saveIndTimer = null;
function flashSaveInd() {
  const el = document.getElementById('save-ind');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(_saveIndTimer);
  _saveIndTimer = setTimeout(() => { el.style.opacity = '0'; }, 1500);
}

function syncStroke(s) {
  if (!serverOnline || !ELO.currentExId) return;
  if (!s.id) s.id = 's_' + Date.now() + '_' + Math.floor(Math.random()*1000);
  fetch(SERVER+'/api/stroke', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ stroke: s, board: ELO.currentExId })
  }).then(() => flashSaveInd()).catch(()=>{});
}

function clearCanvas() {
  strokes = []; redoStack = []; annotations = [];
  render(); renderAnnotations();
  if (serverOnline && ELO.currentExId) {
    fetch(SERVER+'/api/clear', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ board: ELO.currentExId })
    }).catch(()=>{});
  }
}

function undoStroke() {
  if (strokes.length > 0) {
    redoStack.push(strokes.pop());
    render();
    triggerAuto();
  }
}

function redoStroke() {
  if (redoStack.length > 0) {
    strokes.push(redoStack.pop());
    render();
    triggerAuto();
  }
}

function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (const s of strokes) renderStroke(s);
}

function renderStroke(s) {
  const pts = s.pts; if (pts.length < 2) return;
  ctx.globalCompositeOperation = s.tool==='eraser' ? 'destination-out' : 'source-over';
  ctx.strokeStyle=s.color; ctx.lineWidth=Math.max(0.5,s.sz*viewScale);
  ctx.lineCap=ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(wx2sx(pts[0][0]),wy2sy(pts[0][1]));
  for (let i=1;i<pts.length-1;i++) {
    const mx=(pts[i][0]+pts[i+1][0])/2, my=(pts[i][1]+pts[i+1][1])/2;
    ctx.quadraticCurveTo(wx2sx(pts[i][0]),wy2sy(pts[i][1]),wx2sx(mx),wy2sy(my));
  }
  const last=pts[pts.length-1];
  ctx.lineTo(wx2sx(last[0]),wy2sy(last[1]));
  ctx.stroke();
  ctx.globalCompositeOperation='source-over';
}

function drawSeg(wx1,wy1,wx2,wy2,sz,col,t) {
  ctx.globalCompositeOperation=t==='eraser'?'destination-out':'source-over';
  ctx.strokeStyle=col; ctx.lineWidth=Math.max(0.5,sz*viewScale);
  ctx.lineCap=ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(wx2sx(wx1),wy2sy(wy1)); ctx.lineTo(wx2sx(wx2),wy2sy(wy2)); ctx.stroke();
  ctx.globalCompositeOperation='source-over';
}

// ─── POINTER EVENTS ───────────────────────────────────────
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  try { canvas.setPointerCapture(e.pointerId); } catch(_){}
  if (e.pointerType==='pen') {
    penActive=true; clearTimeout(penTimer);
    drawing=true; panActive=false;
    const sp=getScreenPos(e), wp=screenToWorld(sp.x,sp.y);
    currentStroke={tool,color,sz:tool==='eraser'?brushSz*5:brushSz,pts:[[wp.x,wp.y]]};
    canvas._lwx=wp.x; canvas._lwy=wp.y;
  } else if (e.pointerType==='touch') {
    if (penActive) return;
    touchPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    drawing=false;
    if (touchPtrs.size===1) {
      panActive=true; panStart={x:e.clientX,y:e.clientY}; panOffsetStart={...viewOffset};
    } else if (touchPtrs.size===2) {
      panActive=false;
      const pts=[...touchPtrs.values()];
      const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      pinchState={dist,scale:viewScale,ox:viewOffset.x,oy:viewOffset.y,mx:(pts[0].x+pts[1].x)/2,my:(pts[0].y+pts[1].y)/2};
    }
  } else {
    if (panModeBtn) { panActive=true;drawing=false;panStart={x:e.clientX,y:e.clientY};panOffsetStart={...viewOffset}; }
    else {
      drawing=true; panActive=false;
      const sp=getScreenPos(e),wp=screenToWorld(sp.x,sp.y);
      currentStroke={tool,color,sz:tool==='eraser'?brushSz*5:brushSz,pts:[[wp.x,wp.y]]};
      canvas._lwx=wp.x; canvas._lwy=wp.y;
    }
  }
});

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (e.pointerType==='pen') {
    if (!drawing||!currentStroke) return;
    doDrawMove(e);
  } else if (e.pointerType==='touch') {
    if (penActive) return;
    touchPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if (pinchState&&touchPtrs.size>=2) {
      const pts=[...touchPtrs.values()];
      const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      const r=canvas.getBoundingClientRect(), c2c=canvas.width/r.width;
      const newScale=Math.max(0.15,Math.min(10,pinchState.scale*dist/pinchState.dist));
      const pmx=(pts[0].x+pts[1].x)/2,pmy=(pts[0].y+pts[1].y)/2;
      const wx=pinchState.mx*c2c/pinchState.scale+pinchState.ox;
      const wy=pinchState.my*c2c/pinchState.scale+pinchState.oy;
      viewScale=newScale; viewOffset.x=wx-(pmx-r.left)*c2c/newScale; viewOffset.y=wy-(pmy-r.top)*c2c/newScale;
      render(); renderAnnotations();
      document.getElementById('pos-indicator').textContent=`×${viewScale.toFixed(1)}`;
    } else if (panActive) doPan(e);
  } else {
    if (drawing&&currentStroke) doDrawMove(e);
    else if (panActive) doPan(e);
  }
});

canvas.addEventListener('pointerup',e=>{
  if(e.pointerType==='touch'){touchPtrs.delete(e.pointerId);if(touchPtrs.size<2)pinchState=null;if(touchPtrs.size===0)panActive=false;if(touchPtrs.size===1){const rem=[...touchPtrs.values()][0];panActive=true;panStart={x:rem.x,y:rem.y};panOffsetStart={...viewOffset};}}
  endInput(e);
});
canvas.addEventListener('pointercancel',e=>{touchPtrs.delete(e.pointerId);endInput(e);});
canvas.addEventListener('pointerleave', e=>{touchPtrs.delete(e.pointerId);endInput(e);});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

function doDrawMove(e) {
  if(!drawing||!currentStroke) return;
  const sp=getScreenPos(e),wp=screenToWorld(sp.x,sp.y);
  const pressure=e.pressure||0.8;
  const lw=currentStroke.tool==='eraser'?currentStroke.sz:Math.max(1,currentStroke.sz*(0.4+pressure*0.8));
  drawSeg(canvas._lwx,canvas._lwy,wp.x,wp.y,lw,currentStroke.color,currentStroke.tool);
  currentStroke.pts.push([wp.x,wp.y]);
  canvas._lwx=wp.x; canvas._lwy=wp.y;
}

function doPan(e) {
  if(!panActive) return;
  const r=canvas.getBoundingClientRect(),c2c=canvas.width/r.width;
  const dx=(e.clientX-panStart.x)*c2c/viewScale;
  const dy=(e.clientY-panStart.y)*c2c/viewScale;
  viewOffset.x=panOffsetStart.x-dx; viewOffset.y=panOffsetStart.y-dy;
  render(); renderAnnotations();
  document.getElementById('pos-indicator').textContent=`×${viewScale.toFixed(1)}`;
}

function endInput(e) {
  if (drawing&&currentStroke?.pts.length>1) {
    if (!currentStroke.id) currentStroke.id = 's_' + Date.now() + '_' + Math.floor(Math.random()*1000);
    strokes.push(currentStroke); redoStack = []; render(); triggerAuto();
    syncStroke(currentStroke);
  }
  drawing=false; currentStroke=null;
  if(e?.pointerType==='pen'){clearTimeout(penTimer);penTimer=setTimeout(()=>{penActive=false;},2500);}
}

// ─── CAPTURE ──────────────────────────────────────────────
function hasContent() { return strokes.length > 0; }

function captureAll() {
  if (!hasContent()) return null;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for (const s of strokes) for(const [x,y] of s.pts){if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y;}
  const pad=40,nW=maxX-minX+pad*2,nH=maxY-minY+pad*2;
  const scale=Math.min(1600/nW,1600/nH,2);
  const W=Math.ceil(nW*scale),H=Math.ceil(nH*scale);
  const tmp=document.createElement('canvas'); tmp.width=W; tmp.height=H;
  const t=tmp.getContext('2d');
  t.fillStyle='#ffffff'; t.fillRect(0,0,W,H);
  for(const s of strokes){
    if(s.pts.length<2) continue;
    t.globalCompositeOperation=s.tool==='eraser'?'destination-out':'source-over';
    t.strokeStyle=s.color; t.lineWidth=Math.max(0.5,s.sz*scale);
    t.lineCap=t.lineJoin='round';
    t.beginPath(); t.moveTo((s.pts[0][0]-minX+pad)*scale,(s.pts[0][1]-minY+pad)*scale);
    for(let i=1;i<s.pts.length;i++) t.lineTo((s.pts[i][0]-minX+pad)*scale,(s.pts[i][1]-minY+pad)*scale);
    t.stroke();
  }
  t.globalCompositeOperation='source-over';
  return tmp.toDataURL('image/jpeg',0.88).split(',')[1];
}

// ─── AI ANNOTATIONS ───────────────────────────────────────
function toggleAnnLayer() {
  showAnnotations=!showAnnotations;
  const btn=document.getElementById('ai-layer-btn');
  btn.classList.toggle('show-ann',showAnnotations);
  btn.textContent=showAnnotations?'👁 Anotaciones IA':'🙈 Anotaciones IA';
  renderAnnotations();
}

function renderAnnotations() {
  annCtx.clearRect(0,0,annCv.width,annCv.height);
  if (!showAnnotations||!annotations.length) return;
  for (const a of annotations) {
    annCtx.save();
    annCtx.globalAlpha=0.82;
    annCtx.setLineDash([6,4]);
    annCtx.lineWidth=2.5;
    if (a.type==='circle') {
      annCtx.strokeStyle=a.color||'#e94560';
      annCtx.beginPath();
      annCtx.arc(wx2sx(a.x),wy2sy(a.y),(a.r||40)*viewScale,0,Math.PI*2);
      annCtx.stroke();
      if(a.label){annCtx.setLineDash([]);annCtx.fillStyle=a.color||'#e94560';annCtx.font=`bold ${Math.max(11,12*viewScale)}px system-ui`;annCtx.fillText(a.label,wx2sx(a.x)+(a.r||40)*viewScale+4,wy2sy(a.y)+4);}
    } else if (a.type==='arrow') {
      const x1=wx2sx(a.from[0]),y1=wy2sy(a.from[1]),x2=wx2sx(a.to[0]),y2=wy2sy(a.to[1]);
      annCtx.strokeStyle=a.color||'#2ea043';
      annCtx.beginPath(); annCtx.moveTo(x1,y1); annCtx.lineTo(x2,y2); annCtx.stroke();
      // arrowhead
      const ang=Math.atan2(y2-y1,x2-x1);
      const hl=14*viewScale;
      annCtx.setLineDash([]);
      annCtx.fillStyle=a.color||'#2ea043';
      annCtx.beginPath();
      annCtx.moveTo(x2,y2);
      annCtx.lineTo(x2-hl*Math.cos(ang-0.4),y2-hl*Math.sin(ang-0.4));
      annCtx.lineTo(x2-hl*Math.cos(ang+0.4),y2-hl*Math.sin(ang+0.4));
      annCtx.closePath(); annCtx.fill();
      if(a.label){annCtx.fillStyle=a.color||'#2ea043';annCtx.font=`bold ${Math.max(11,12*viewScale)}px system-ui`;annCtx.fillText(a.label,(x1+x2)/2+4,(y1+y2)/2-4);}
    } else if (a.type==='text') {
      annCtx.setLineDash([]);
      annCtx.fillStyle=a.color||'#d29922';
      annCtx.font=`bold ${Math.max(12,13*viewScale)}px system-ui`;
      annCtx.fillText(a.text,wx2sx(a.x),wy2sy(a.y));
    }
    annCtx.restore();
  }
}

function applyAnnotations(arr) {
  if (!Array.isArray(arr)) return;
  annotations = arr;
  renderAnnotations();
  // vibrate canvas briefly
  annCv.style.filter='brightness(1.3)';
  setTimeout(()=>annCv.style.filter='',400);
}

let autoOn=true, autoTimer=null, busy=false;

function toggleAuto() {
  autoOn=!autoOn;
  const el=document.getElementById('autostatus');
  el.textContent=`⚡ Auto-${autoOn?'ON':'OFF'}`;
  el.className=autoOn?'on':'';
}

function triggerAuto() {
  if(!autoOn||busy) return;
  clearTimeout(autoTimer);
  const el=document.getElementById('autostatus');
  el.textContent='⏳...'; el.className='analyzing';
  autoTimer=setTimeout(async()=>{
    if(hasContent()&&!busy) await sendAI('',true,true);
    el.textContent=`⚡ Auto-${autoOn?'ON':'OFF'}`;
    el.className=autoOn?'on':'';
  }, CFG.auto_delay*1000);
}

// ═══════════════════════════════════════════════════════════
// TTS — Kokoro IA (local, sin API key) + fallback Web Speech
// Kokoro-82M corre en browser via WASM. ~80MB descarga única.
// ═══════════════════════════════════════════════════════════
let ttsOn      = false;
let kokoroTTS  = null;   // instancia Kokoro
let kokoroOk   = false;  // listo para hablar
let kokoroLoading = false;
let currentAudioCtx = null;
let currentAudioSrc = null;
const ttsBtn = document.getElementById('btn-tts-bar');

// Voces españolas disponibles en Kokoro-82M:
// ef_dora (female, latin), em_alex (male), em_santa (male)
const KOKORO_VOICE = 'em_santa';
const KOKORO_MODEL = 'onnx-community/Kokoro-82M-v1.0';

async function initKokoro() {
  if (kokoroOk || kokoroLoading) return;
  kokoroLoading = true;
  ttsBtn.textContent = '⏳ Descargando IA...';
  ttsBtn.title = 'Descargando modelo Kokoro (~80MB, solo la primera vez)';
  try {
    // Carga dinámica — no bloquea el resto de la app
    const { KokoroTTS } = await import('https://cdn.jsdelivr.net/npm/kokoro-js@1.2.1/dist/index.js');

    kokoroTTS = await KokoroTTS.from_pretrained(KOKORO_MODEL, {
      dtype: 'q8',          // cuantizado int8 — más rápido, mismo resultado
      device: 'wasm',       // funciona sin GPU
      progress_callback: p => {
        if (p.loaded && p.total) {
          const pct = Math.round(p.loaded / p.total * 100);
          ttsBtn.textContent = `⏳ ${pct}%`;
        }
      }
    });
    kokoroOk = true;
    ttsBtn.textContent = '🔊 Voz IA';
    ttsBtn.style.background = '#8b5cf6'; // morado = Kokoro activo
    ttsBtn.title = 'Kokoro TTS — IA local, sin internet';
    addMsg('sys', '🎙 Kokoro TTS listo — voz IA activada');
  } catch(err) {
    console.warn('Kokoro falló, usando Web Speech:', err);
    kokoroOk = false;
    ttsBtn.textContent = '🔊 Voz';
    ttsBtn.style.background = '';
    ttsBtn.title = 'Web Speech API (voz del sistema)';
  }
  kokoroLoading = false;
}

function cleanForTTS(txt) {
  return txt
    .replace(/\$\$[\s\S]*?\$\$/g, ' ')              // LaTeX display
    .replace(/\$[^$]+\$/g, ' ')                      // LaTeX inline
    .replace(/```[\s\S]*?```/g, ' ')                 // code blocks
    .replace(/`[^`]+`/g, ' ')                        // inline code
    .replace(/#{1,6}\s/g, '')                        // markdown headers
    .replace(/\*\*([^*]+)\*\*/g, '$1')               // bold
    .replace(/\*([^*]+)\*/g, '$1')                   // italic
    .replace(/##ERROR:[^#]+##/g, '')                 // error tags
    .replace(/[🎯💡⚡✅❌⚠️🔴🟡🟢🎙🎨🔊🔇⏳▶]/gu, '') // emojis comunes
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 500); // máx 500 chars para no hacer esperar demasiado
}

async function speakKokoro(txt) {
  if (!kokoroOk || !kokoroTTS || !txt) return false;
  const clean = cleanForTTS(txt);
  if (!clean) return false;
  try {
    // Detener cualquier audio previo
    if (currentAudioSrc) { try { currentAudioSrc.stop(); } catch(e){} }
    if (currentAudioCtx) { try { currentAudioCtx.close(); } catch(e){} }

    const result = await kokoroTTS.generate(clean, { voice: KOKORO_VOICE });
    // result.audio = Float32Array, result.sampling_rate = 24000
    currentAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = currentAudioCtx.createBuffer(1, result.audio.length, result.sampling_rate);
    buf.getChannelData(0).set(result.audio);
    currentAudioSrc = currentAudioCtx.createBufferSource();
    currentAudioSrc.buffer = buf;
    currentAudioSrc.connect(currentAudioCtx.destination);
    currentAudioSrc.start(0);
    return true;
  } catch(err) {
    console.warn('Kokoro speak error:', err);
    return false;
  }
}

// Fallback: Web Speech con mejor voz del sistema
function pickBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  const es = voices.filter(v => v.lang.startsWith('es'));
  if (!es.length) return null;
  const prio = [
    v => v.name.includes('Laura')   && v.name.includes('Microsoft'),
    v => v.name.includes('Elvira')  && v.name.includes('Microsoft'),
    v => v.name.includes('Dalia')   && v.name.includes('Microsoft'),
    v => v.name.includes('Sabina')  && v.name.includes('Microsoft'),
    v => v.name.includes('Helena')  && v.name.includes('Microsoft'),
    v => v.name.includes('Microsoft'),
    v => v.name.includes('Google'),
    () => true,
  ];
  for (const t of prio) { const v = es.find(t); if (v) return v; }
  return es[0];
}

function speakSystem(txt) {
  if (!txt) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(cleanForTTS(txt));
  u.lang = 'es-ES'; u.rate = 0.92; u.pitch = 1.0; u.volume = 1.0;
  const saved = localStorage.getItem('din_voice');
  // Si la preferencia guardada es Kokoro o está vacía, usar auto-pick del sistema
  if (saved && saved !== '__kokoro__') {
    const v = window.speechSynthesis.getVoices().find(v => v.name === saved);
    if (v) u.voice = v;
  } else {
    const auto = pickBestVoice();
    if (auto) u.voice = auto;
  }
  window.speechSynthesis.speak(u);
}

function preferKokoro() {
  const saved = localStorage.getItem('din_voice') || '__kokoro__';
  return saved === '__kokoro__';
}

async function speak(txt) {
  if (!ttsOn || !txt) return;
  if (preferKokoro()) {
    const ok = await speakKokoro(txt);
    if (!ok) speakSystem(txt); // fallback si Kokoro no está listo aún
  } else {
    speakSystem(txt);
  }
}

async function previewVoice() {
  const txt = 'Hola, soy tu tutor de dinámica. ¿Listo para el parcial del miércoles?';
  if (preferKokoro()) {
    // Iniciar Kokoro si no está cargado
    if (!kokoroOk && !kokoroLoading) await initKokoro();
    // Esperar si está cargando (máx 60s)
    if (kokoroLoading) {
      let waited = 0;
      while (kokoroLoading && waited < 60000) {
        await new Promise(r => setTimeout(r, 500));
        waited += 500;
      }
    }
    // Actualizar estado en el selector
    populateVoiceSelect();
    const ok = await speakKokoro(txt);
    if (!ok) speakSystem(txt);
  } else {
    speakSystem(txt);
  }
}

function toggleTTS() {
  ttsOn = !ttsOn;
  if (ttsOn) {
    ttsBtn.classList.add('active');
    if (preferKokoro()) {
      // Cargar Kokoro si aún no está listo
      if (!kokoroOk && !kokoroLoading) initKokoro();
      else ttsBtn.textContent = kokoroOk ? '🔊 Voz IA' : '🔊 Voz';
    } else {
      ttsBtn.textContent = '🔊 Voz';
    }
  } else {
    ttsBtn.textContent = '🔇 Voz';
    ttsBtn.classList.remove('active');
    ttsBtn.style.background = '';
    window.speechSynthesis.cancel();
    if (currentAudioSrc) { try { currentAudioSrc.stop(); } catch(e){} }
  }
}

function populateVoiceSelect() {
  const sel = document.getElementById('s-voice-sel');
  if (!sel) return;

  const saved = localStorage.getItem('din_voice') || '';

  // Kokoro primero — opción premium
  const kokoroState = kokoroOk ? '✅ listo' : kokoroLoading ? '⏳ cargando...' : '⬇ descarga ~80MB';
  sel.innerHTML = `<option value="__kokoro__">🤖 Kokoro IA (em_santa) — ${kokoroState}</option>`;

  // Separador voces del sistema
  const grp = document.createElement('optgroup');
  grp.label = '── Voces del sistema ──';
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('es'));
  if (voices.length === 0) {
    const opt = document.createElement('option');
    opt.value = ''; opt.textContent = '— Auto (mejor disponible) —';
    grp.appendChild(opt);
  }
  voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    grp.appendChild(opt);
  });
  sel.appendChild(grp);

  // Restaurar selección guardada
  sel.value = saved || '__kokoro__';

  // Mostrar estado de Kokoro debajo del selector
  const statusEl = document.getElementById('kokoro-status');
  if (statusEl) {
    if (sel.value === '__kokoro__') {
      statusEl.style.display = 'block';
      statusEl.textContent = kokoroOk

// MIC — detección inteligente de fin de habla
// Problema: silencios de 3s para pensar, muletillas (mmm, eeh, pues...)
// Solución: timer largo + filtro de muletillas + indicador visual
// ═══════════════════════════════════════════════════════════
let micOn=false, recognition=null, micTimer=null, micCountdown=null;
const micBtn=document.getElementById('btn-mic-bar');

// Muletillas y palabras vacías que NO deben disparar el envío
const FILLERS = /^(mm+|eh+|ah+|uh+|hmm+|pues|bueno|o\s*sea|este|entonces|o|y|pero|¿+|\.+|,+|\s*)$/i;
const getSendDelay = () => window.SEND_DELAY_MS_OVERRIDE || 3500;
let micCountEl = null; // elemento DOM del countdown

function isMeaningful(txt) {
  const clean = txt.trim().replace(/[.,¿?¡!]/g,'');
  if (clean.length < 4) return false;
  // Verificar que no sea solo muletillas
  const words = clean.split(/\s+/);
  const meaningful = words.filter(w => !FILLERS.test(w));
  return meaningful.length >= 1;
}

function startSendCountdown() {
  let remaining = getSendDelay() / 1000;
  micBtn.textContent = `🔴 ${remaining.toFixed(0)}s`;
  clearInterval(micCountdown);
  micCountdown = setInterval(()=>{
    remaining -= 0.5;
    if(remaining > 0) {
      micBtn.textContent = `🔴 ${remaining.toFixed(0)}s`;
    } else {
      clearInterval(micCountdown);
      micBtn.textContent = '🔴';
    }
  }, 500);
}

function cancelSendCountdown() {
  clearInterval(micCountdown);
  clearTimeout(micTimer);
  micBtn.textContent = '🔴';
}

function toggleMic() {
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('Tu navegador no soporta reconocimiento de voz'); return;
  }
  if (!recognition) {
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();
    recognition.continuous=true;
    recognition.interimResults=true;
    recognition.lang='es-ES';
    recognition.maxAlternatives=1;

    let fullTranscript='';

    recognition.addEventListener('result', e=>{
      // Acumular transcript completo (results finales + interim actual)
      let interim='';
      let newFinal='';
      for(let i=0;i<e.results.length;i++){
        if(e.results[i].isFinal) newFinal+=e.results[i][0].transcript+' ';
        else interim+=e.results[i][0].transcript;
      }
      // Actualizar input con lo que se oye en tiempo real
      const display=(newFinal+interim).trim();
      document.getElementById('main-input').value=display;

      // Si hay resultado FINAL con contenido real → iniciar countdown
      if(newFinal.trim() && isMeaningful(newFinal.trim())) {
        cancelSendCountdown();
        micTimer=setTimeout(()=>{
          cancelSendCountdown();
          // Solo enviar si hay contenido real
          const txt=document.getElementById('main-input').value.trim();
          if(isMeaningful(txt)) sendAI();
          document.getElementById('main-input').value='';
        }, getSendDelay());
        startSendCountdown();
      }
    });

    recognition.addEventListener('speechend', ()=>{
      // speechend = el browser detectó pausa larga
      // Si ya hay timer corriendo, déjalo. Si no hay nada útil, no hacer nada.
    });

    recognition.addEventListener('end', ()=>{
      if(micOn) {
        try { recognition.start(); } catch(e){}
      }
    });

    recognition.addEventListener('error', e=>{
      if(e.error==='no-speech') return; // silencio normal, ignorar
      if(e.error==='aborted') return;
      console.warn('Mic error:', e.error);
    });
  }

  micOn=!micOn;
  if(micOn){
    try { recognition.start(); } catch(e){}
    micBtn.classList.add('rec');
    micBtn.textContent='🔴';
  } else {
    recognition.stop();
    cancelSendCountdown();
    micBtn.classList.remove('rec');
    micBtn.textContent='🎤';
  }
}

// Cache de la solución del solucionario para el ejercicio activo
let _cachedSolId = null;
let _cachedSolData = null;

async function fetchSolutionCtx(exId) {
  if (!exId) return '';
  if (_cachedSolId === exId) return _cachedSolData;
  try {
    const r = await fetch(`/api/solutions?id=${encodeURIComponent(exId)}`);
    const sol = await r.json();
    if (sol && sol.problem_id) {
      _cachedSolId = exId;
      _cachedSolData = `\n\n## SOLUCIÓN OFICIAL (solucionario Beer & Johnston — SOLO PARA VERIFICACIÓN INTERNA, NUNCA REVELAR)\nPasos: ${sol.steps}\nRespuesta final: ${sol.final_answer}`;
      return _cachedSolData;
    }
  } catch(e) {}
  _cachedSolId = exId;
  _cachedSolData = '';
  return '';
}

function buildSystemPrompt(solCtx = '') {
  const ex = ELO.currentExId && EXERCISES[ELO.currentExId] ? EXERCISES[ELO.currentExId] : null;
  const exCtx = ex
    ? `\n\n## EJERCICIO ACTIVO\nID: ${ex.id}\nTítulo: ${ex.title}\nEnunciado: ${ex.text}\nMétodo recomendado: ${ex.method}\nRespuesta correcta (solo para verificación interna, NUNCA revelar): ${ex.answer}${solCtx}`
    : '';

  const errCtx = dynErrors.length
    ? '\n\n## ERRORES FRECUENTES DEL ESTUDIANTE\n' + dynErrors.map((e,i)=>`${i+1}. "${e.d}" (×${e.n})`).join('\n')
    : '';

  return `Eres un tutor de Dinámica (Beer & Johnston, español, Caps 12-15). El estudiante tiene parcial el miércoles. Sé directo y eficiente.

## REGLA DE ORO — LEE ESTO PRIMERO
NUNCA hagas preguntas de clasificación si el estudiante ya dio suficiente contexto.
Si alguien dice "quiero resolver el 13.5" → empieza a resolverlo, no preguntes qué tipo de problema es.
Si alguien dice "usé F=ma y me da X" → corrígele directamente ese paso.
UNA sola pregunta por respuesta. Máximo.

## FLUJO REAL (no un árbol rígido)

**Cuando llega un problema nuevo:**
→ Identifica tú internamente el método correcto.
→ Di cuál es el método en una frase ("Este es trabajo-energía.") y pide el PRIMER PASO concreto: "¿Cuánto vale T₁?"
→ NO preguntes "¿qué tipo de problema crees que es?" si el enunciado es claro.

**Cuando el estudiante da un intento (correcto):**
→ Confirma en max 5 palabras: "¡Exacto!" o "Correcto, eso es."
→ Pide inmediatamente el SIGUIENTE número concreto.
→ NO hagas un discurso. Sigue.

**Cuando el estudiante da un intento (incorrecto):**
→ Señala el error específico: "Ahí el signo es negativo porque la fricción se opone al movimiento."
→ Pide que lo corrija con el número nuevo.
→ Si falla 2 veces en lo mismo: explica el paso completo y pide el SIGUIENTE.

**Cuando el estudiante está perdido o frustrado:**
→ Abandona las preguntas. Explica directo.
→ "Oye, escucha: aquí lo que pasa es [explicación en 2 líneas]. Ahora tú calcula [X]."

**Para el DCL:**
→ AL INICIO DEL EJERCICIO, DEBES usar el campo "annotations" para DIBUJAR el Diagrama de Cuerpo Libre (DCL) inicial en la pizarra para explicarle al estudiante.
→ Usa "circle", "arrow", "text". Sitúa tu dibujo en el centro de la pizarra usando coordenadas aproximadas x: 200 a 800, y: 150 a 600.
→ NO le pidas al estudiante que dibuje el primer DCL. DIBÚJALO TÚ y dale una breve explicación.
→ Cuando el estudiante añada algo al DCL, evalúa su dibujo.

## FÓRMULAS CLAVE

**Cinemática:** v=v₀+at · x=v₀t+½at² · v²=v₀²+2aΔx · aₙ=v²/ρ

**F=ma:** ΣF=ma · ΣFₙ=mv²/ρ · ΣFₜ=maₜ

**Trabajo-Energía:** T₁+U₁₂=T₂ · T=½mv² · U_peso=Wh · U_resorte=½kx₁²-½kx₂² · U_fricción=-fd

**Potencia:** P=Fv · 1hp=550ft·lb/s=746W

**Impulso-Momento:** mv₁+ΣFΔt=mv₂ · conservación: Σmv=cte · restitución: e=(v'B-v'A)/(vA-vB)

**DCL — siempre incluir:** peso W↓ · normal N⊥superficie · fricción f=μN (opuesta al mov.) · tensiones · fuerzas externas${exCtx}${errCtx}

## FORMATO DE RESPUESTA — OBLIGATORIO, sin texto fuera del JSON:
\`\`\`json
{
  "chat": "respuesta en español, LaTeX con $...$ o $$...$$, máx 120 palabras salvo que sea una explicación necesaria",
  "voz": "frase coloquial máx 12 palabras SIN fórmulas ni símbolos",
  "annotations": []
}
\`\`\`

annotations solo si hay imagen de DCL y necesitas señalar algo:
[{"type":"circle","x":300,"y":200,"r":35,"color":"#e94560","label":"falta peso"},
 {"type":"arrow","from":[100,100],"to":[150,200],"color":"#2ea043","label":"N"},
 {"type":"text","x":200,"y":80,"color":"#d29922","text":"ΣFy=0"}]

Registra errores con ##ERROR:[max 7 palabras]## dentro del campo chat.
NUNCA reveles la respuesta final. Sí puedes mostrar pasos intermedios para desbloquear al estudiante.`;
}

function addMsg(role, content, cls='', save=true) {
  // Save to server
  if (save && serverOnline && ELO.currentExId && role !== 'ai typing') {
    fetch(SERVER+'/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ role, content, cls, ex_id: ELO.currentExId })
    }).catch(()=>{});
  }

  // User messages are not shown on the board (just sent)
  if (role === 'user') { const d=document.createElement('div'); return d; }

  const d = document.createElement('div');
  const roleMap = { 'ai typing':'aib-msg typing', 'ai err':'aib-msg ai err', sys:'aib-msg sys' };
  d.className = roleMap[role] || ('aib-msg ' + role + (cls ? ' '+cls : ''));
  d.innerHTML = renderMD(content);

  const body = document.getElementById('ai-board-body');
  body.appendChild(d);
  body.scrollTop = 9e9;

  if(window.katexReady||window.renderMathInElement){
    setTimeout(()=>{
      try{renderMathInElement(d,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){}
    },50);
  }
  // Show board if minimized
  if (aiBoardMin && (role === 'ai' || role === 'ai err')) toggleAIBoard();
  return d;
}

function renderMD(txt) {
  if (!txt) return '';
  let t = txt;
  // Remove error markers
  t = t.replace(/##ERROR:[^#\n]+##/g,'');
  t = escH(t);
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t = t.replace(/`(.+?)`/g,'<code style="background:#0d1117;padding:1px 4px;border-radius:3px;color:#79c0ff;font-size:0.9em">$1</code>');
  t = t.replace(/\n/g,'<br>');
  return t;
}

function escH(s) {
  const d=document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

// ─── SEND AI ──────────────────────────────────────────────
async function sendAI(forceTxt='', isAuto=false, includeCanvas=false) {
  if(busy) return;
  const inp=document.getElementById('main-input');
  const txt = forceTxt !== undefined && forceTxt !== '' ? forceTxt : inp.value.trim();
  const img64 = includeCanvas ? captureAll() : null;

  if (!txt && !img64 && !pendImgs.length) return;

  // Build message content
  const content = [];
  if (img64) content.push({type:'image_url',image_url:{url:'data:image/jpeg;base64,'+img64}});
  pendImgs.forEach(im=>content.push({type:'image_url',image_url:{url:'data:image/jpeg;base64,'+im.b64}}));
  if (txt) content.push({type:'text',text:txt});

  if (!isAuto && txt) {
    addMsg('user', txt);
    chatHistory.push({role:'user',content:content.length===1&&!img64&&!pendImgs.length?txt:content});
  } else if (isAuto && img64) {
    chatHistory.push({role:'user',content:[{type:'image_url',image_url:{url:'data:image/jpeg;base64,'+img64}},{type:'text',text:'[Análisis automático del DCL dibujado — guía sin revelar respuesta]'}]});
  } else if (txt) {
    chatHistory.push({role:'user',content:content.length===1?txt:content});
  }

  if(!isAuto) { inp.value=''; inp.style.height='auto'; pendImgs=[]; }

  busy=true;
  document.getElementById('analyze-ind').style.display='block';
  const loadEl=addMsg('ai typing','Analizando...');

  try {
    const resp = await callOR();
    loadEl.remove();
    const payload = parsePayload(resp);
    const chatTxt = payload.chat || payload.voz || resp;

    // Register hints used
    if(payload.chat && payload.chat.includes('💡')) ELO.hintsUsed++;

    // Extract errors
    const errMs = [...(payload.chat||'').matchAll(/##ERROR:([^#\n]+)##/g)];
    errMs.forEach(m=>addError(m[1]));

    addMsg('ai', chatTxt);
    speak(payload.voz || '');

    // Apply annotations
    if(payload.annotations&&payload.annotations.length>0) {
      applyAnnotations(payload.annotations);
      if(showAnnotations) addMsg('sys','🎨 IA añadió anotaciones en la pizarra');
    }

    chatHistory.push({role:'assistant',content:payload.chat||resp});
    // Keep history trimmed (last 20 turns)
    if(chatHistory.length>40) chatHistory.splice(0,chatHistory.length-40);

  } catch(err) {
    loadEl.remove();
    addMsg('ai err', `❌ Error: ${err.message}`);
  }

  busy=false;
  document.getElementById('analyze-ind').style.display='none';
}

async function callOR() {
  const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method:'POST',
    headers:{
      'Authorization':'Bearer '+CFG.or_key,
      'Content-Type':'application/json',
      'HTTP-Referer':'http://localhost:8080',
      'X-Title':'Tutor Dinamica BJ'
    },
    body:JSON.stringify({
      model: CFG.or_model,
      max_tokens: 2048,
      messages:[
        {role:'system',content:buildSystemPrompt(await fetchSolutionCtx(ELO.currentExId))},
        ...chatHistory
      ]
    })
  });
  if(!resp.ok){
    const e=await resp.json().catch(()=>({error:{message:'HTTP '+resp.status}}));
    throw new Error(e.error?.message||'HTTP '+resp.status);
  }
  const data=await resp.json();
  return data.choices?.[0]?.message?.content || '';
}

// ─── JSON PARSER (5 estrategias) ──────────────────────────
function parsePayload(raw) {
  if(!raw) return {chat:'',voz:'',annotations:[]};
  // S0: fix backslashes before json parse
  const fixed = raw.replace(/\\(?!["\\/bfnrtu])/g,'\\\\');
  // S1: plain JSON
  try { const p=JSON.parse(fixed); if(p.chat||p.voz) return ensureAnn(p); } catch(e){}
  // S2: extract JSON from code block
  const cb = fixed.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(cb){try{const p=JSON.parse(cb[1].trim());if(p.chat||p.voz) return ensureAnn(p);}catch(e){}}
  // S3: find first { ... }
  const brace = fixed.match(/(\{[\s\S]*\})/);
  if(brace){try{const p=JSON.parse(brace[1]);if(p.chat||p.voz) return ensureAnn(p);}catch(e){}}
  // S4: regex extract fields
  const unesc=s=>s.replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\"/g,'"').replace(/\\\\/g,'\\').replace(/\\([^"\\\/bfnrtu])/g,'$1');
  const chatM=raw.match(/"chat"\s*:\s*"((?:[^"\\]|\\[\s\S])*)"/);
  if(chatM){
    const vozM=raw.match(/"voz"\s*:\s*"((?:[^"\\]|\\[\s\S])*)"/);
    return {chat:unesc(chatM[1]),voz:vozM?unesc(vozM[1]):'',annotations:[]};
  }
  // S5: raw text
  return {chat:raw,voz:'',annotations:[]};
}

function ensureAnn(p){ if(!p.annotations) p.annotations=[]; return p; }
